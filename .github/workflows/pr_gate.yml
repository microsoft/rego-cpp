name: PR Gate

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  cpp-format:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path: 
          - check: src
            exclude: (/base64/)
          - check: tests
            exclude: ''
          - check: tools
            exclude: ''
          - check: examples/c
          - check: examples/cpp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run clang-format style check
        uses: jidicula/clang-format-action@v4.8.0
        with:
          clang-format-version: '18'
          check-path: ${{matrix.path['check']}}
          exclude-regex: ${{matrix.path['exclude']}}

  ubuntu2204:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libssl-dev

      - name: CMake config
        run: cmake -B ${{github.workspace}}/build --preset release-opa -G Ninja

      - name: CMake build
        working-directory: ${{github.workspace}}/build
        run: ninja

      - name: CMake test
        working-directory: ${{github.workspace}}/build
        run: ctest -V --build-config Release --timeout 120 --output-on-failure -T Test

  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libssl-dev

      - name: CMake config
        run: cmake -B ${{github.workspace}}/build --preset release-opa -G Ninja

      - name: CMake build
        working-directory: ${{github.workspace}}/build
        run: ninja

      - name: CMake test
        working-directory: ${{github.workspace}}/build
        run: ctest -V --build-config Release --timeout 120 --output-on-failure -T Test

  linux-asan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libssl-dev

      - name: CMake config
        run: cmake -B ${{github.workspace}}/build --preset release-clang-opa -DREGOCPP_SANITIZE=address,undefined

      - name: CMake build
        working-directory: ${{github.workspace}}/build
        run: ninja

      - name: CMake test
        working-directory: ${{github.workspace}}/build
        run: ctest -V --build-config Release --timeout 120 --output-on-failure -T Test

  linux-wrappers-c:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libssl-dev

      - name: CMake config
        working-directory: ${{github.workspace}}/examples/c
        run: cmake -B ${{github.workspace}}/examples/c/build --preset release -G Ninja
        env:
          REGOCPP_REPO: LOCAL

      - name: CMake build
        working-directory: ${{github.workspace}}/examples/c/build
        run: ninja install

      - name: CMake test
        working-directory: ${{github.workspace}}/examples/c/build
        run: ctest -V --build-config Release --timeout 120 --output-on-failure -T Test

  linux-wrappers-dotnet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Use dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: dotnet test
        working-directory: ${{github.workspace}}/wrappers/dotnet/
        run: |
          dotnet test -v n /p:Multitarget=true

  linux-wrappers-rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo rustc libssl-dev

      - name: Cargo test
        working-directory: ${{github.workspace}}/wrappers/rust/regorust/
        run: cargo test -vv
        env:
          REGOCPP_REPO: LOCAL

  linux-wrappers-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Python ${{matrix.python_version}}
        uses: actions/setup-python@v4
        with:
          python-version: ${{matrix.python_version}}

      - name: Get dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
          python -m pip install --upgrade pip

      - name: Python build
        working-directory: ${{github.workspace}}/wrappers/python/
        run: pip install -e .[dev]
        env:
          REGOCPP_REPO: LOCAL

      - name: Python test
        working-directory: ${{github.workspace}}/wrappers/python/ 
        run: pytest -vv

  linux-cheriot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: CHERIoT-Platform/cheriot-audit
          path: cheriot-audit

      - name: Get dependencies
        run: |
          sudo apt-get install ninja-build

      - name: Git config for fetching pull requests
        run: |
          git config --global --add remote.origin.fetch +refs/pull/*/merge:refs/remotes/pull/*

      - name: CMake config
        working-directory: ${{github.workspace}}/cheriot-audit
        run: cmake -B ${{github.workspace}}/cheriot-audit/build -DCMAKE_BUILD_TYPE=Release -G Ninja
        env:
          REGOCPP_REPO: https://github.com/${{github.repository}}
          REGOCPP_TAG: ${{github.sha}}

      - name: CMake build
        working-directory: ${{github.workspace}}/cheriot-audit/build
        run: NINJA_STATUS="%p [%f:%s/%t] %o/s, %es" && ninja

      - name: CMake test
        working-directory: ${{github.workspace}}/cheriot-audit/build
        run: ctest -j4 --output-on-failure

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: CMake config
        run: |
          cmake -B ${{github.workspace}}/build --preset release-windows-opa
      
      - name: CMake build
        working-directory: ${{github.workspace}}/build
        run: cmake --build . --config Release
      
      - name: CMake test
        working-directory: ${{github.workspace}}/build
        run: ctest -V --build-config Release --timeout 120 --output-on-failure -T Test

  windows-wrappers-c:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CMake config
        working-directory: ${{github.workspace}}/examples/c
        run: cmake -B ${{github.workspace}}/examples/c/build --preset release
        env:
          REGOCPP_REPO: LOCAL

      - name: CMake build
        working-directory: ${{github.workspace}}/examples/c/build
        run: cmake --build . --config Release --target INSTALL

      - name: CMake test
        working-directory: ${{github.workspace}}/examples/c/build
        run: ctest -V --build-config Release --timeout 120 --output-on-failure -T Test

  windows-wrappers-dotnet:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: dotnet test
        working-directory: ${{github.workspace}}/wrappers/dotnet/
        run: |
          dotnet test -v n /p:Multitarget=true

  windows-wrappers-rust:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cargo test
        working-directory: ${{github.workspace}}/wrappers/rust/regorust
        run: cargo test -vv
        env:
          REGOCPP_REPO: LOCAL

  windows-wrappers-python:
    runs-on: windows-latest
    strategy:
      matrix:
        python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Python ${{matrix.python_version}}
        uses: actions/setup-python@v4
        with:
          python-version: ${{matrix.python_version}}
          architecture: x64

      - name: Get dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Python build
        working-directory: ${{github.workspace}}/wrappers/python/
        run: pip install -e .[dev]
        env:
          REGOCPP_REPO: LOCAL

      - name: Python test
        working-directory: ${{github.workspace}}/wrappers/python/ 
        run: pytest -vv

  macos-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          brew update && brew install ninja openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: CMake config
        run: cmake -B ${{github.workspace}}/build --preset release-opa -G Ninja

      - name: CMake build
        working-directory: ${{github.workspace}}/build
        run: ninja

      - name: CMake test
        working-directory: ${{github.workspace}}/build
        run: ctest -V --build-config Release --timeout 120 --output-on-failure -T Test

  macos-arm64-wrappers-c:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          brew update && brew install ninja openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: CMake config
        working-directory: ${{github.workspace}}/examples/c
        run: cmake -B ${{github.workspace}}/examples/c/build --preset release -G Ninja
        env:
          REGOCPP_REPO: LOCAL

      - name: CMake build
        working-directory: ${{github.workspace}}/examples/c/build
        run: ninja install

      - name: CMake test
        working-directory: ${{github.workspace}}/examples/c/build
        run: ctest -V --build-config Release --timeout 120 --output-on-failure -T Test

  macos-arm64-wrappers-dotnet:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          brew update && brew install openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: Use dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: dotnet test
        working-directory: ${{github.workspace}}/wrappers/dotnet/
        run: |
          dotnet test -v n /p:Multitarget=true

  macos-arm64-wrappers-rust:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          brew update && brew install rust openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: Cargo test
        working-directory: ${{github.workspace}}/wrappers/rust/regorust/
        run: cargo test -vv
        env:
          REGOCPP_REPO: LOCAL

  macos-arm64-wrappers-python:
    runs-on: macos-latest
    strategy:
      matrix:
        python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Python ${{matrix.python_version}}
        uses: actions/setup-python@v4
        with:
          python-version: ${{matrix.python_version}}

      - name: Get dependencies
        run: |
          brew update && brew install openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          python -m pip install --upgrade pip

      - name: Python build
        working-directory: ${{github.workspace}}/wrappers/python/
        run: pip install -e .[dev] --verbose
        env:
          REGOCPP_REPO: LOCAL

      - name: Python test
        working-directory: ${{github.workspace}}/wrappers/python/ 
        run: pytest -vv

  macos-x86_64:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          brew update && brew install ninja openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: CMake config
        run: cmake -B ${{github.workspace}}/build --preset release-opa -G Ninja

      - name: CMake build
        working-directory: ${{github.workspace}}/build
        run: ninja

      - name: CMake test
        working-directory: ${{github.workspace}}/build
        run: ctest -V --build-config Release --timeout 120 --output-on-failure -T Test

  macos-x86_64-wrappers-dotnet:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get dependencies
        run: |
          brew update && brew install openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: Use dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: dotnet test
        working-directory: ${{github.workspace}}/wrappers/dotnet/
        run: |
          dotnet test -v n /p:Multitarget=true

  macos-x86_64-wrappers-python:
    runs-on: macos-15-intel
    strategy:
      matrix:
        python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Python ${{matrix.python_version}}
        uses: actions/setup-python@v4
        with:
          python-version: ${{matrix.python_version}}

      - name: Get dependencies
        run: |
          brew update && brew install openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          python -m pip install --upgrade pip

      - name: Python build
        working-directory: ${{github.workspace}}/wrappers/python/
        run: pip install -e .[dev] --verbose
        env:
          REGOCPP_REPO: LOCAL

      - name: Python test
        working-directory: ${{github.workspace}}/wrappers/python/ 
        run: pytest -vv

  vcpkg-integration:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            install_deps: sudo apt-get update && sudo apt-get install -y ninja-build libssl-dev
          - os: macos-latest
            install_deps: brew update && brew install ninja openssl@3
          - os: windows-latest
            install_deps: ""
    runs-on: ${{ matrix.os }}
    name: vcpkg - ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Check version consistency
      shell: bash
      run: |
        file_ver=$(head -1 VERSION | tr -d '[:space:]')
        vcpkg_ver=$(grep '"version"' ports/rego-cpp/vcpkg.json | sed 's/.*: *"\(.*\)".*/\1/')
        if [ "$file_ver" != "$vcpkg_ver" ]; then
          echo "::error::VERSION ($file_ver) and ports/rego-cpp/vcpkg.json ($vcpkg_ver) are out of sync."
          exit 1
        fi
        echo "Version consistent: $file_ver"

    - name: Get dependencies
      if: matrix.install_deps != ''
      shell: bash
      run: ${{ matrix.install_deps }}

    - name: Bootstrap vcpkg
      shell: bash
      run: |
        git clone https://github.com/microsoft/vcpkg.git "${{ runner.temp }}/vcpkg" --depth 1
        if [ "$RUNNER_OS" = "Windows" ]; then
          "${{ runner.temp }}/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
        else
          "${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        fi

    - name: Create overlay port pointing at local source
      shell: bash
      run: |
        overlay="${{ runner.temp }}/overlay/rego-cpp"
        mkdir -p "$overlay"
        # Copy the real port files
        cp ports/rego-cpp/vcpkg.json "$overlay/"
        cp ports/rego-cpp/usage "$overlay/"
        # Normalize workspace path to forward slashes for CMake (Windows compat)
        ws_path=$(echo "${{ github.workspace }}" | sed 's|\\|/|g')
        # Rewrite portfile to use local source instead of vcpkg_from_github
        {
          echo "set(SOURCE_PATH \"${ws_path}\")"
          echo ''
          # Keep everything from the feature block onwards (see NOTE comment in
          # ports/rego-cpp/portfile.cmake documenting this coupling)
          sed -n '/^if("openssl3"/,$ p' ports/rego-cpp/portfile.cmake
        } > "$overlay/portfile.cmake"
        # Validate that the sed extraction actually matched
        if ! grep -q 'vcpkg_cmake_configure' "$overlay/portfile.cmake"; then
          echo "::error::Overlay portfile extraction failed — 'vcpkg_cmake_configure' not found."
          echo "The sed pattern in this workflow is coupled to ports/rego-cpp/portfile.cmake."
          echo "See the NOTE comment in that file."
          exit 1
        fi

    - name: Install rego-cpp via vcpkg
      shell: bash
      # Run from runner.temp to avoid the workspace triggering manifest mode.
      working-directory: ${{ runner.temp }}
      run: |
        "${{ runner.temp }}/vcpkg/vcpkg" install "rego-cpp[openssl3,tools]" \
          --overlay-ports="${{ runner.temp }}/overlay"

    - name: Verify rego CLI
      shell: bash
      run: |
        # Find the rego binary under the vcpkg installed tools directory
        rego_bin=$(find "${{ runner.temp }}/vcpkg/installed" -path "*/tools/rego-cpp/rego*" -type f | head -1)
        if [ -z "$rego_bin" ]; then
          echo "::error::rego CLI binary not found under vcpkg installed tools"
          find "${{ runner.temp }}/vcpkg/installed" -type f -name "rego*" || true
          exit 1
        fi
        echo "Found rego CLI at: $rego_bin"
        result=$("$rego_bin" eval '1+1')
        echo "Result: $result"
        if echo "$result" | grep -q '"expressions":\[2\]'; then
          echo "rego CLI works correctly"
        else
          echo "::error::Unexpected output from rego CLI: $result"
          exit 1
        fi

    - name: Build consumer project
      shell: bash
      run: |
        cmake -B "${{ runner.temp }}/consumer-build" \
          -S tests/vcpkg-consumer \
          -DCMAKE_TOOLCHAIN_FILE="${{ runner.temp }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
        cmake --build "${{ runner.temp }}/consumer-build" --config Release

    - name: Run tests
      shell: bash
      run: |
        ctest --test-dir "${{ runner.temp }}/consumer-build" \
          --build-config Release --output-on-failure

  vcpkg-integration-minimal:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            install_deps: ""
          - os: macos-latest
            install_deps: ""
          - os: windows-latest
            install_deps: ""
    runs-on: ${{ matrix.os }}
    name: vcpkg minimal - ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Bootstrap vcpkg
      shell: bash
      run: |
        git clone https://github.com/microsoft/vcpkg.git "${{ runner.temp }}/vcpkg" --depth 1
        if [ "$RUNNER_OS" = "Windows" ]; then
          "${{ runner.temp }}/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
        else
          "${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        fi

    - name: Create overlay port pointing at local source
      shell: bash
      run: |
        overlay="${{ runner.temp }}/overlay/rego-cpp"
        mkdir -p "$overlay"
        cp ports/rego-cpp/vcpkg.json "$overlay/"
        cp ports/rego-cpp/usage "$overlay/"
        ws_path=$(echo "${{ github.workspace }}" | sed 's|\\|/|g')
        {
          echo "set(SOURCE_PATH \"${ws_path}\")"
          echo ''
          sed -n '/^if("openssl3"/,$ p' ports/rego-cpp/portfile.cmake
        } > "$overlay/portfile.cmake"
        if ! grep -q 'vcpkg_cmake_configure' "$overlay/portfile.cmake"; then
          echo "::error::Overlay portfile extraction failed — 'vcpkg_cmake_configure' not found."
          exit 1
        fi

    - name: Install rego-cpp via vcpkg (no features)
      shell: bash
      working-directory: ${{ runner.temp }}
      run: |
        "${{ runner.temp }}/vcpkg/vcpkg" install rego-cpp \
          --overlay-ports="${{ runner.temp }}/overlay"

    - name: Build consumer project
      shell: bash
      run: |
        cmake -B "${{ runner.temp }}/consumer-build" \
          -S tests/vcpkg-consumer \
          -DCMAKE_TOOLCHAIN_FILE="${{ runner.temp }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
        cmake --build "${{ runner.temp }}/consumer-build" --config Release

    - name: Run tests
      shell: bash
      run: |
        ctest --test-dir "${{ runner.temp }}/consumer-build" \
          --build-config Release --output-on-failure
