    }
  query: data.test.p = x
  strict_error: true
  want_error_code: eval_builtin_error
  want_error: "units.parse: no amount provided"
- note: regocpp/units-parse-e-sign
  modules:
  - |
    package test

    p if {
      units.parse("e+K")
    }
  query: data.test.p = x
  strict_error: true
  want_error_code: eval_builtin_error
  want_error: "units.parse: could not parse amount to a number"
- note: regocpp/uri-parse-ipv6-zone
  modules:
  - |
    package test

    p := uri.parse("http://[fe80::1%25eth0]:8080/")
  query: data.test.p = x
  want_result:
  - x:
      scheme: "http"
      hostname: "fe80::1%eth0"
      port: "8080"
      path: "/"
      raw_path: "/"
- note: regocpp/uri-parse-opaque
  modules:
  - |
    package test

    p := uri.parse("mailto:user@example.com")
  query: data.test.p = x
  want_result:
  - x:
      scheme: "mailto"
- note: regocpp/uri-is-valid-control-byte
  modules:
  - |
    package test

    p := uri.is_valid("http://a\tb.com")
  query: data.test.p = x
  want_result:
  - x: false
- note: regocpp/uri-is-valid-ok
  modules:
  - |
    package test

    p := uri.is_valid("http://example.com/path")
  query: data.test.p = x
  want_result:
